name: Deploy via FTP

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      # Optional: target directory on the server (defaults to the FTP home directory).
      FTP_SERVER_DIR: ${{ vars.FTP_SERVER_DIR }}
      # Optional: set to "false" for plain FTP if the host does not support FTPS (default: TLS on).
      FTP_TLS: ${{ vars.FTP_TLS }}
      # Optional: canonical site URL (no trailing slash). If set, it replaces the default
      # domain in the Open Graph / Twitter share tags at deploy time.
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Point the social-share tags (og:url, og:image, twitter:image) at the
      # configured domain. Without SITE_URL the built-in default is kept.
      - name: Set share URLs
        if: ${{ env.FTP_SERVER != '' && env.SITE_URL != '' }}
        run: |
          BASE="${SITE_URL%/}"
          find . -name '*.html' -not -path './.git/*' -not -path './.github/*' -print0 \
            | xargs -0 sed -i "s#https://478breathing\.hydrax\.org#${BASE}#g"
          echo "Set share URLs to ${BASE}"

      - name: Check FTP secrets
        if: ${{ env.FTP_SERVER == '' }}
        run: |
          echo "::warning::FTP secrets are missing. Set FTP_SERVER, FTP_USERNAME and FTP_PASSWORD (environment: production) and re-run. Skipping deploy for now."

      # Append the commit SHA to the CSS/JS URLs so browsers fetch the new version
      # instead of a cached one (see the Expires headers in .htaccess).
      - name: Cache-bust CSS/JS
        if: ${{ env.FTP_SERVER != '' }}
        run: |
          VER="${GITHUB_SHA:0:8}"
          find . -name '*.html' -not -path './.git/*' -not -path './.github/*' -print0 \
            | xargs -0 sed -i \
              -e "s#\(styles\.css\)\"#\1?v=${VER}\"#g" \
              -e "s#\(audio\.js\)\"#\1?v=${VER}\"#g" \
              -e "s#\(app\.js\)\"#\1?v=${VER}\"#g"
          echo "Stamped CSS/JS with ?v=${VER}"

      - name: Install lftp
        if: ${{ env.FTP_SERVER != '' }}
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      # lftp mirrors the working tree to the server. Explicit FTPS (AUTH TLS) is used
      # by default; set the FTP_TLS variable to "false" for plain FTP.
      - name: Deploy via lftp
        if: ${{ env.FTP_SERVER != '' }}
        run: |
          TARGET="${FTP_SERVER_DIR:-.}"
          if [ "${FTP_TLS:-true}" = "false" ]; then
            SSL="set ftp:ssl-allow false;"
          else
            SSL="set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no;"
          fi
          lftp -c "
            set cmd:fail-exit true;
            ${SSL}
            set ftp:passive-mode true;
            set net:max-retries 3;
            set net:timeout 20;
            open -u '${FTP_USERNAME}','${FTP_PASSWORD}' '${FTP_SERVER}';
            mirror --reverse --delete --verbose --parallel=1 \
              --exclude '(^|/)\.git' \
              --exclude '(^|/)\.github/' \
              --exclude '(^|/)\.claude/' \
              --exclude '(^|/)\.gitignore$' \
              --exclude '\.md$' \
              --exclude '(^|/)LICENSE$' \
              --exclude '(^|/)\.DS_Store$' \
              ./ '${TARGET}';
          "

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#e9ecef" media="(prefers-color-scheme: light)">
  <meta name="description" content="Minimalistische Unterstützung für die 4-7-8-Atmung: 4 Sekunden einatmen, 7 halten, 8 ausatmen.">
  <title>4-7-8 Atmung</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage" id="stage">
    <!-- The circle itself is the start/stop button -->
    <button class="breath" id="breathBtn" type="button" aria-label="Atmung starten">
      <svg class="breath-svg" viewBox="0 0 200 200" aria-hidden="true">
        <circle class="fill" id="fill" cx="100" cy="100" r="80"></circle>
        <circle class="ring" id="ring" cx="100" cy="100" r="77.5"></circle>
      </svg>

      <!-- Play icon in the idle state -->
      <svg class="ctrl-icon play-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M8 5v14l11-7z"></path>
      </svg>
      <!-- Stop icon while running (on hover/focus) -->
      <svg class="ctrl-icon stop-icon" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="6" y="6" width="12" height="12" rx="2"></rect>
      </svg>

      <span class="phase-text" id="phaseText" aria-hidden="true"></span>
    </button>

    <div class="counter" id="counter" aria-live="polite"></div>
  </main>

  <!-- Subtle settings gear -->
  <button class="settings-toggle" id="settingsToggle" type="button" aria-label="Einstellungen" aria-expanded="false" aria-controls="settingsPanel">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.49.49 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path>
    </svg>
  </button>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel" role="dialog" aria-label="Einstellungen" hidden>
    <h2 data-i18n="settings_title">Einstellungen</h2>

    <label class="row">
      <span data-i18n="language">Sprache</span>
      <select id="setLang">
        <option value="de">Deutsch</option>
        <option value="en">English</option>
      </select>
    </label>

    <label class="row">
      <span data-i18n="design">Design</span>
      <select id="setTheme">
        <option value="system" data-i18n="opt_system">System</option>
        <option value="light" data-i18n="opt_light">Hell</option>
        <option value="dark" data-i18n="opt_dark">Dunkel</option>
      </select>
    </label>

    <label class="row switch-row">
      <span data-i18n="sound">Ton</span>
      <input type="checkbox" id="setSound" class="switch">
    </label>

    <label class="row switch-row">
      <span data-i18n="color">Farbwechsel</span>
      <input type="checkbox" id="setColor" class="switch">
    </label>

    <label class="row switch-row">
      <span data-i18n="phaseText">Phasen-Text</span>
      <input type="checkbox" id="setPhaseText" class="switch">
    </label>

    <label class="row switch-row">
      <span data-i18n="counter">Zyklus-Zähler</span>
      <input type="checkbox" id="setCounter" class="switch">
    </label>

    <label class="row">
      <span data-i18n="autostop">Auto-Stopp</span>
      <select id="setAutoStop">
        <option value="0">Unbegrenzt</option>
        <option value="1">1 Runde</option>
        <option value="2">2 Runden</option>
        <option value="4">4 Runden</option>
        <option value="8">8 Runden</option>
        <option value="12">12 Runden</option>
      </select>
    </label>
  </div>

  <footer class="footer">
    <a href="impressum.html" data-i18n="imprint">Impressum</a>
    <span aria-hidden="true">·</span>
    <a href="datenschutz.html" data-i18n="privacy">Datenschutz</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
